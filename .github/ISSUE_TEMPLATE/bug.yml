name: 🐛 Bug
description: Report a bug
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Click on...
        2. Expected X, got Y
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Chest version / commit
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
